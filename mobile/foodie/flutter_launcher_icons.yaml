flutter_launcher_icons:
  # Single composed source: orange background + Appicon.png symbol
  # Generated by: dart run flutter_launcher_icons
  image_path: "assets/icons/AppIconMaster.png"
  android: true
  ios: true
  # Removes any previous adaptive icon configuration on Android
  adaptive_icon_background: "#FF7A00"
  adaptive_icon_foreground: "assets/icons/AppIconMaster.png"
  min_sdk_android: 21
