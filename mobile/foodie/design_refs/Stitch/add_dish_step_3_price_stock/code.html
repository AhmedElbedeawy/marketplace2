<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Add New Dish - Price &amp; Stock</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "secondary-fixed": "#fdd34d",
                        "background": "#f6f6f6",
                        "secondary-dim": "#624d00",
                        "on-secondary": "#fff2d4",
                        "on-surface": "#2d2f2f",
                        "surface-dim": "#d3d5d5",
                        "secondary-container": "#fdd34d",
                        "tertiary-container": "#f4c4b4",
                        "surface-container": "#e7e8e8",
                        "outline": "#767777",
                        "primary-fixed-dim": "#e57d21",
                        "on-primary-container": "#421e00",
                        "primary": "#904800",
                        "on-primary": "#fff0e8",
                        "surface-bright": "#f6f6f6",
                        "on-tertiary-container": "#5e3e32",
                        "on-secondary-container": "#5c4900",
                        "error-dim": "#b92902",
                        "error": "#b02500",
                        "inverse-surface": "#0c0f0f",
                        "surface-container-low": "#f0f1f1",
                        "secondary-fixed-dim": "#eec540",
                        "surface-tint": "#904800",
                        "secondary": "#705900",
                        "on-secondary-fixed-variant": "#675200",
                        "on-tertiary-fixed": "#482b20",
                        "surface-variant": "#dbdddd",
                        "error-container": "#f95630",
                        "on-tertiary-fixed-variant": "#69473a",
                        "primary-fixed": "#f68a2f",
                        "on-tertiary": "#ffefeb",
                        "inverse-primary": "#f68a2f",
                        "on-secondary-fixed": "#463600",
                        "tertiary-fixed-dim": "#e5b7a7",
                        "surface-container-highest": "#dbdddd",
                        "surface-container-lowest": "#ffffff",
                        "outline-variant": "#acadad",
                        "on-background": "#2d2f2f",
                        "on-primary-fixed-variant": "#502500",
                        "on-primary-fixed": "#0f0400",
                        "tertiary": "#775346",
                        "surface": "#f6f6f6",
                        "primary-container": "#f68a2f",
                        "inverse-on-surface": "#9c9d9d",
                        "tertiary-dim": "#6a473b",
                        "tertiary-fixed": "#f4c4b4",
                        "surface-container-high": "#e1e3e3",
                        "on-error": "#ffefec",
                        "primary-dim": "#7e3e00",
                        "on-error-container": "#520c00",
                        "on-surface-variant": "#5a5c5c"
                    },
                    fontFamily: {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #f6f6f6;
            font-family: 'Manrope', sans-serif;
            color: #2d2f2f;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen pb-32">
<!-- Top Navigation Anchor (Shared Component) -->
<header class="fixed top-0 w-full z-50 bg-[#f6f6f6]/80 dark:bg-neutral-900/80 backdrop-blur-md shadow-sm dark:shadow-none">
<div class="flex items-center justify-between px-4 h-16 w-full">
<button class="active:scale-95 duration-200 hover:opacity-70 transition-opacity text-[#2d2f2f]">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-['Plus_Jakarta_Sans'] font-bold text-lg tracking-tight text-[#904800]">Add New Dish</h1>
<button class="active:scale-95 duration-200 hover:opacity-70 transition-opacity text-[#2d2f2f]">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<div class="bg-[#f0f1f1] dark:bg-neutral-800 h-[1px] w-full self-end"></div>
</header>
<main class="pt-20 px-4 max-w-md mx-auto">
<!-- Progress Bar Section -->
<div class="mb-8">
<div class="flex justify-between items-end mb-2">
<span class="font-headline font-bold text-sm tracking-tight text-on-surface">Step 3 of 5</span>
<span class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant">Price &amp; Stock</span>
</div>
<div class="h-1.5 w-full bg-surface-container rounded-full overflow-hidden">
<div class="h-full bg-gradient-to-r from-primary to-primary-container w-3/5 rounded-full"></div>
</div>
</div>
<!-- Main Content Canvas -->
<section class="space-y-6">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-xl bg-secondary-container flex items-center justify-center text-on-secondary-container">
<span class="material-symbols-outlined">payments</span>
</div>
<h2 class="font-headline font-extrabold text-2xl tracking-tight text-on-surface">Price &amp; Stock Variants</h2>
</div>
<!-- Portion Card 1 -->
<div class="bg-surface-container-lowest rounded-[1.5rem] p-6 shadow-[0_-4px_24px_0_rgba(45,47,47,0.04)] border border-outline-variant/10">
<div class="flex justify-between items-center mb-6">
<h3 class="font-headline font-bold text-lg text-primary">Portion 1</h3>
<span class="text-xs font-label uppercase tracking-wider text-outline px-2 py-1 bg-surface-container-low rounded-lg">Default</span>
</div>
<div class="space-y-5">
<!-- Portion Type -->
<div class="space-y-1.5">
<label class="font-label text-xs font-bold uppercase tracking-wider text-on-surface-variant ml-1">Portion Type</label>
<div class="relative">
<select class="w-full bg-surface-container-low border-none rounded-xl py-4 px-4 font-body text-on-surface appearance-none focus:ring-2 focus:ring-primary/20 transition-all">
<option>Large</option>
<option>Medium</option>
<option>Small</option>
<option>Custom</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-outline">expand_more</span>
</div>
</div>
<div class="grid grid-cols-2 gap-4">
<!-- Price Input -->
<div class="space-y-1.5">
<label class="font-label text-xs font-bold uppercase tracking-wider text-on-surface-variant ml-1">Price (SAR)</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-none rounded-xl py-4 px-4 font-headline font-bold text-on-surface focus:ring-2 focus:ring-primary/20 transition-all placeholder:text-outline-variant/50" placeholder="0.00" type="number"/>
<span class="absolute right-4 top-1/2 -translate-y-1/2 text-[10px] font-black text-outline">SAR</span>
</div>
</div>
<!-- Stock Input -->
<div class="space-y-1.5">
<label class="font-label text-xs font-bold uppercase tracking-wider text-on-surface-variant ml-1">Stock</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-none rounded-xl py-4 px-4 font-headline font-bold text-on-surface focus:ring-2 focus:ring-primary/20 transition-all placeholder:text-outline-variant/50" placeholder="20" type="number"/>
<span class="absolute right-4 top-1/2 -translate-y-1/2 text-[10px] font-black text-outline">PCS</span>
</div>
</div>
</div>
</div>
</div>
<!-- Add Another Button -->
<button class="w-full flex items-center justify-center gap-2 py-4 border-2 border-dashed border-outline-variant/30 rounded-xl text-primary font-bold hover:bg-surface-container-low transition-colors group active:scale-[0.98] duration-200">
<span class="material-symbols-outlined text-primary group-hover:rotate-90 transition-transform">add_circle</span>
<span class="font-label text-sm uppercase tracking-widest">+ Add Another Portion</span>
</button>
<!-- Inventory Insights Glass Card -->
<div class="bg-secondary-container/20 rounded-xl p-4 flex gap-4 items-start border border-secondary-container/30">
<span class="material-symbols-outlined text-secondary-dim mt-0.5">info</span>
<p class="font-body text-xs leading-relaxed text-on-secondary-container">
                    Defining variants helps customers choose the right amount and allows you to track inventory more accurately for high-demand periods.
                </p>
</div>
</section>
</main>
<!-- Fixed Bottom Actions -->
<footer class="fixed bottom-0 left-0 w-full bg-[#f6f6f6]/95 backdrop-blur-xl px-4 pb-10 pt-4 flex gap-4 z-40">
<button class="flex-1 py-4 bg-surface-container-highest text-on-surface font-bold rounded-full active:scale-95 transition-transform">
            Back
        </button>
<button class="flex-[2] py-4 bg-gradient-to-r from-primary to-primary-container text-white font-bold rounded-full shadow-lg shadow-primary/20 active:scale-95 transition-transform flex items-center justify-center gap-2">
            Next Step
            <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</footer>
<!-- Visual Hint: Consistent with IMAGE_5 look (Editorial Style) -->
<div class="fixed top-0 right-0 -z-10 w-64 h-64 bg-primary-container/5 rounded-full blur-[80px]"></div>
<div class="fixed bottom-0 left-0 -z-10 w-64 h-64 bg-secondary-container/10 rounded-full blur-[80px]"></div>
</body></html>
